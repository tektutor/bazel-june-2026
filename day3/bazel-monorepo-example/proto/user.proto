// proto/user.proto
syntax = "proto3";
package monorepo.proto;

message User {
    string id       = 1;
    string username = 2;
    string email    = 3;
    repeated string roles = 4;
}

message AuthRequest {
    string username = 1;
    string password = 2;
}

message AuthResponse {
    bool   success = 1;
    string token   = 2;
    string error   = 3;
}
